name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - run: go build -ldflags="-s -w" -o skills-linux-amd64 .
      - run: ./skills-linux-amd64 completion zsh > _skills
      - uses: actions/upload-artifact@v4
        with:
          name: skills-linux-amd64
          path: skills-linux-amd64
      - uses: actions/upload-artifact@v4
        with:
          name: skills-zsh-completion
          path: _skills

  build-macos-arm:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - run: go build -ldflags="-s -w" -o skills-darwin-arm64 .
      - uses: actions/upload-artifact@v4
        with:
          name: skills-darwin-arm64
          path: skills-darwin-arm64

  build-macos-amd:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - run: go build -ldflags="-s -w" -o skills-darwin-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: skills-darwin-amd64
          path: skills-darwin-amd64

  release:
    needs: [build-linux, build-macos-arm, build-macos-amd]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: skills-*
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: skills-zsh-completion

      - name: Checksums
        run: sha256sum skills-* _skills > checksums.txt

      - uses: softprops/action-gh-release@v1
        with:
          files: |
            skills-*
            _skills
            checksums.txt
          generate_release_notes: true

  update-homebrew:
    needs: [build-linux, build-macos-arm, build-macos-amd]
    runs-on: ubuntu-latest
    if: github.repository == 'cagedbird043/skills'
    steps:
      - uses: actions/checkout@v4
        with:
          path: skills-repo

      - uses: actions/download-artifact@v4
        with:
          pattern: skills-*
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: skills-zsh-completion

      - name: Compute SHA256
        id: shas
        run: |
          echo "linux_sha=$(sha256sum skills-linux-amd64 | cut -d' ' -f1)" >> "$GITHUB_ENV"
          echo "darwin_arm_sha=$(sha256sum skills-darwin-arm64 | cut -d' ' -f1)" >> "$GITHUB_ENV"
          echo "darwin_amd_sha=$(sha256sum skills-darwin-amd64 | cut -d' ' -f1)" >> "$GITHUB_ENV"
          echo "completion_sha=$(sha256sum _skills | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
        with:
          repository: cagedbird043/homebrew-tap
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 "$GITHUB_WORKSPACE/skills-repo/.github/scripts/update-homebrew-formula.py" \
            homebrew-tap/Formula/skills-cli.rb "$VERSION" \
            "${{ env.linux_sha }}" \
            "${{ env.darwin_arm_sha }}" \
            "${{ env.darwin_amd_sha }}" \
            "${{ env.completion_sha }}"
          cd homebrew-tap
          git add Formula/skills-cli.rb
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -m "skills-cli: update to v${VERSION}"
          git push
